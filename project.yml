name: nexus_shell
options:
  bundleIdPrefix: com.nexusshell
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.nexusshell.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  NMSSH:
    path: /tmp/NMSSH

targets:
  nexus_shell:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Services
      - path: Utilities
    resources:
      - path: Resources
    dependencies:
      - package: NMSSH
        product: NMSSH
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nexusshell.app
